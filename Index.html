<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RS Admin | Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #f8fafc; color: #334155; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); border-radius: 16px; transition: all 0.3s ease; }
        .glass-card:hover { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); transform: translateY(-2px); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-btn { transition: all 0.3s; border-right: 4px solid transparent; }
        .sidebar-btn:hover { background: #f1f5f9; color: #0f172a; }
        .sidebar-btn.active { background: #eff6ff; color: #3b82f6; border-right-color: #3b82f6; font-weight: 600; }
        tr { transition: all 0.2s; } tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-white border-r border-gray-200 flex flex-col shadow-sm z-10 hidden md:flex">
        <div class="p-8 text-center border-b border-gray-100">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner"><i class="fas fa-chart-pie"></i></div>
            <h2 class="text-xl font-bold text-gray-800 tracking-wide">RS ADMIN</h2>
            <p class="text-xs text-gray-500 mt-1">Control Panel v2.0</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-users', this)" class="sidebar-btn active w-full flex items-center p-4 text-gray-600 rounded-xl"><i class="fas fa-users w-8 text-lg"></i> จัดการสมาชิก</button>
            <button onclick="switchTab('tab-withdraw', this)" class="sidebar-btn w-full flex items-center p-4 text-gray-600 rounded-xl"><i class="fas fa-money-bill-wave w-8 text-lg"></i> รายการถอน <span id="badge-wd" class="ml-auto bg-red-500 text-white text-xs px-2 py-1 rounded-full hidden">0</span></button>
            <button onclick="switchTab('tab-settings', this)" class="sidebar-btn w-full flex items-center p-4 text-gray-600 rounded-xl"><i class="fas fa-cog w-8 text-lg"></i> ตั้งค่าระบบ</button>
        </nav>
    </div>

    <div class="flex-1 p-8 lg:p-12 overflow-y-auto">
        
        <div id="tab-users" class="tab-content active">
            <div class="flex justify-between items-end mb-8">
                <div><h2 class="text-3xl font-bold text-gray-800">จัดการสมาชิก</h2><p class="text-gray-500 mt-1">ดูยอดเงินและปรับเรทอัตราชนะของผู้เล่น</p></div>
                <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold shadow-sm">ผู้เล่นทั้งหมด <span id="total-users">0</span> คน</div>
            </div>
            
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider border-b border-gray-200">
                        <tr><th class="p-5 font-semibold">ผู้เล่น</th><th class="p-5 font-semibold">ยอดเงินคงเหลือ</th><th class="p-5 font-semibold">โอกาสชนะ (Win Rate)</th><th class="p-5 font-semibold text-right">แอคชัน</th></tr>
                    </thead>
                    <tbody id="user-table" class="divide-y divide-gray-100 text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-withdraw" class="tab-content">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-gray-800">รายการรอถอนเงิน</h2><p class="text-gray-500 mt-1">อนุมัติหรือยกเลิกการถอนเงินของลูกค้า</p>
            </div>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider border-b border-gray-200">
                        <tr><th class="p-5 font-semibold">ผู้เล่น</th><th class="p-5 font-semibold">จำนวนเงิน</th><th class="p-5 font-semibold">บัญชีรับเงิน</th><th class="p-5 font-semibold text-right">จัดการ</th></tr>
                    </thead>
                    <tbody id="wd-table" class="divide-y divide-gray-100 text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-gray-800">ตั้งค่าระบบ</h2><p class="text-gray-500 mt-1">ตั้งค่าลิงก์และช่องทางการติดต่อ</p>
            </div>
            <div class="glass-card p-8 max-w-2xl">
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">ลิงก์ติดต่อแอดมิน (ฝากเงิน)</label>
                    <div class="flex shadow-sm rounded-xl overflow-hidden border border-gray-200 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition">
                        <span class="inline-flex items-center px-4 bg-gray-50 text-gray-500 border-r border-gray-200"><i class="fab fa-line text-green-500 text-xl"></i></span>
                        <input type="text" id="contact-link" placeholder="https://line.me/ti/p/~yourid" class="w-full p-4 outline-none text-gray-700">
                    </div>
                </div>
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition">บันทึกข้อมูล</button>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ โค้ด Firebase ตัวใหม่
        const firebaseConfig = {
            apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI",
            projectId: "gaga-1eb83"
        };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.sidebar-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
        }

        // โหลดข้อมูลสมาชิก
        db.collection('users').onSnapshot(snap => {
            let html = ''; let count = 0;
            snap.forEach(doc => {
                const u = doc.data(); count++;
                html += `<tr>
                    <td class="p-5"><div class="font-bold text-gray-800">${u.name || '-'}</div><div class="text-xs text-gray-500">${u.email || doc.id}</div></td>
                    <td class="p-5"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold text-sm">฿ ${(u.balance || 0).toLocaleString()}</span></td>
                    <td class="p-5"><span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full font-bold text-sm">${u.winRate !== undefined ? u.winRate : 35} %</span></td>
                    <td class="p-5 text-right"><button onclick="editUser('${doc.id}', ${u.balance || 0}, ${u.winRate !== undefined ? u.winRate : 35})" class="text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg text-sm font-semibold transition">แก้ไข</button></td>
                </tr>`;
            });
            document.getElementById('user-table').innerHTML = html || '<tr><td colspan="4" class="p-8 text-center text-gray-500">ไม่มีข้อมูลสมาชิก</td></tr>';
            document.getElementById('total-users').innerText = count;
        });

        async function editUser(uid, bal, rate) {
            const { value: form } = await Swal.fire({
                title: 'จัดการผู้เล่น',
                html: `
                    <div class="text-left mb-4"><label class="text-sm font-bold text-gray-600 block mb-1">ยอดเงินคงเหลือ</label><input id="s-bal" type="number" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="${bal}"></div>
                    <div class="text-left"><label class="text-sm font-bold text-gray-600 block mb-1">โอกาสชนะ (0-100%)</label><input id="s-rate" type="number" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="${rate}"></div>
                `,
                showCancelButton: true, confirmButtonText: 'บันทึก', confirmButtonColor: '#3b82f6',
                preConfirm: () => ({ bal: Number(document.getElementById('s-bal').value), rate: Number(document.getElementById('s-rate').value) })
            });
            if(form) {
                await db.collection('users').doc(uid).update({ balance: form.bal, winRate: form.rate });
                Swal.fire({icon:'success', title:'อัปเดตเรียบร้อย', toast:true, position:'top-end', timer:1500, showConfirmButton:false});
            }
        }

        // โหลดรายการถอน
        db.collection('transactions').where('status', '==', 'pending').onSnapshot(snap => {
            let html = ''; let count = 0;
            snap.forEach(doc => {
                const t = doc.data(); count++;
                html += `<tr>
                    <td class="p-5"><div class="font-bold text-gray-800">${t.name}</div><div class="text-xs text-gray-400">${t.dateStr}</div></td>
                    <td class="p-5"><span class="text-red-500 font-bold text-lg">฿ ${t.amount.toLocaleString()}</span></td>
                    <td class="p-5"><div class="font-semibold text-gray-700">${t.bankName}</div><div class="text-sm text-gray-500">${t.bankAcc}</div></td>
                    <td class="p-5 text-right space-x-2">
                        <button onclick="updateTx('${doc.id}', 'success')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">โอนแล้ว</button>
                        <button onclick="updateTx('${doc.id}', 'cancel', '${t.uid}', ${t.amount})" class="bg-gray-200 hover:bg-red-500 hover:text-white text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition">ยกเลิก/คืนเงิน</button>
                    </td>
                </tr>`;
            });
            document.getElementById('wd-table').innerHTML = html || '<tr><td colspan="4" class="p-8 text-center text-gray-500">ไม่มีรายการรอดำเนินการ</td></tr>';
            const badge = document.getElementById('badge-wd');
            if(count > 0) { badge.classList.remove('hidden'); badge.innerText = count; } else { badge.classList.add('hidden'); }
        });

        async function updateTx(txId, status, uid = null, amount = 0) {
            if(!(await Swal.fire({title:'ยืนยันคำสั่ง?', icon:'warning', showCancelButton:true, confirmButtonColor:'#3b82f6'})).isConfirmed) return;
            const batch = db.batch();
            batch.update(db.collection('transactions').doc(txId), {status: status});
            if(status === 'cancel' && uid) {
                const uDoc = await db.collection('users').doc(uid).get();
                if(uDoc.exists) batch.update(db.collection('users').doc(uid), {balance: uDoc.data().balance + amount});
            }
            await batch.commit();
            Swal.fire({icon:'success', title:'ทำรายการสำเร็จ', toast:true, position:'top-end', timer:1500, showConfirmButton:false});
        }

        // โหลดและบันทึกตั้งค่า
        db.collection('settings').doc('admin').get().then(doc => { if(doc.exists) document.getElementById('contact-link').value = doc.data().contact_link || ''; });
        async function saveSettings() {
            const link = document.getElementById('contact-link').value;
            await db.collection('settings').doc('admin').set({ contact_link: link }, {merge: true});
            Swal.fire({icon:'success', title:'บันทึกลิงก์สำเร็จ', confirmButtonColor:'#3b82f6'});
        }
    </script>
</body>
</html>
