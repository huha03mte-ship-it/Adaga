<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RSPAY | Admin Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: #f3f4f6; color: #1f2937; display: flex; }
        .sidebar { width: 250px; background: #1f2937; color: white; height: 100vh; padding: 20px; position: fixed; }
        .sidebar h2 { color: #4ade80; text-align: center; margin-bottom: 30px; }
        .menu-btn { display: block; width: 100%; padding: 15px; background: transparent; border: none; color: white; text-align: left; font-size: 1.1rem; cursor: pointer; border-bottom: 1px solid #374151; }
        .menu-btn:hover, .menu-btn.active { background: #4ade80; color: #1f2937; font-weight: 600; }
        .content { margin-left: 250px; padding: 30px; width: calc(100% - 250px); }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        .btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; color: white; }
        .btn-green { background: #22c55e; }
        .btn-red { background: #ef4444; }
        .btn-blue { background: #3b82f6; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .b-pending { background: #fef08a; color: #854d0e; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>RS ADMIN</h2>
        <button class="menu-btn active" onclick="showTab('wd-section', this)">รายการถอนเงิน</button>
        <button class="menu-btn" onclick="showTab('user-section', this)">จัดการสมาชิก</button>
        <button class="menu-btn" onclick="showTab('sys-section', this)">ตั้งค่าระบบ</button>
    </div>

    <div class="content">
        <div id="wd-section" class="section active">
            <h2>รายการถอนเงิน (ล่าสุด)</h2>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>เวลา</th>
                            <th>ID / ชื่อ</th>
                            <th>จำนวนเงิน</th>
                            <th>ธนาคารที่รับเงิน</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="wd-table"><tr><td colspan="6">กำลังโหลด...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="user-section" class="section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h2>รายชื่อสมาชิก</h2>
                <button class="btn btn-blue" onclick="createUser()">+ เพิ่มสมาชิกใหม่</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>ID (6 หลัก)</th>
                            <th>ชื่อ</th>
                            <th>รหัสผ่าน</th>
                            <th>ยอดเงิน</th>
                            <th>จัดการยอดเงิน</th>
                        </tr>
                    </thead>
                    <tbody id="user-table"></tbody>
                </table>
            </div>
        </div>

        <div id="sys-section" class="section">
            <h2>ตั้งค่าระบบ</h2>
            <div class="card">
                <p style="margin-bottom: 15px;">สถานะระบบถอนเงินหน้าเว็บ</p>
                <select id="sys-withdraw" style="padding: 10px; width: 200px; margin-bottom: 15px;">
                    <option value="open">เปิดให้ถอนปกติ</option>
                    <option value="closed">ปิดปรับปรุง (ลูกค้ากดถอนไม่ได้)</option>
                </select>
                <br>
                <button class="btn btn-green" onclick="saveSystem()">บันทึกการตั้งค่า</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ใส่ Firebase Config ตรงนี้
        const firebaseConfig = {
            apiKey: "AIzaSyCrpBKrWplX3qQT_h-QMftmaTSV71sikf4",
            projectId: "fnag-b078c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showTab(tabId, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(m => m.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // --- 1. Load Withdrawals (FIXED BUG: Sort in JS) ---
        db.collection('transactions').onSnapshot(snap => {
            let txs = [];
            snap.forEach(doc => txs.push({id: doc.id, ...doc.data()}));
            
            // เรียงลำดับจากเวลาใหม่ล่าสุดไปเก่าที่สุด (กันบัค Index)
            txs.sort((a, b) => b.timestamp - a.timestamp);

            let html = '';
            txs.forEach(tx => {
                let statusBadge = tx.status === 'pending' ? '<span class="badge b-pending">รอโอน</span>' : 
                                 (tx.status === 'success' ? '<span class="badge" style="background:#bbf7d0;color:#166534">สำเร็จ</span>' : 
                                 '<span class="badge" style="background:#fecaca;color:#991b1b">ยกเลิก</span>');
                
                let actionBtns = tx.status === 'pending' ? 
                    `<button class="btn btn-green" onclick="approveWd('${tx.id}')">โอนแล้ว</button>
                     <button class="btn btn-red" onclick="cancelWd('${tx.id}', '${tx.uid}', ${tx.amount})">ยกเลิก(คืนเงิน)</button>` : '-';

                html += `<tr>
                    <td>${tx.dateStr}</td>
                    <td><b>${tx.uid}</b><br><small>${tx.name}</small></td>
                    <td style="color:#ef4444; font-weight:bold;">${tx.amount} ฿</td>
                    <td>${tx.bank} <br> ${tx.bankAcc} <br> ${tx.bankName}</td>
                    <td>${statusBadge}</td>
                    <td>${actionBtns}</td>
                </tr>`;
            });
            document.getElementById('wd-table').innerHTML = html || '<tr><td colspan="6">ไม่มีรายการ</td></tr>';
        });

        async function approveWd(id) {
            if(confirm('ยืนยันว่าคุณโอนเงินให้ลูกค้าแล้ว?')) {
                await db.collection('transactions').doc(id).update({ status: 'success' });
            }
        }

        async function cancelWd(txId, uid, amount) {
            if(confirm('ยืนยันการยกเลิก และคืนเงินเข้าระบบให้ลูกค้า?')) {
                const batch = db.batch();
                batch.update(db.collection('transactions').doc(txId), { status: 'cancel' });
                
                const userRef = db.collection('users').doc(uid);
                const userSnap = await userRef.get();
                if(userSnap.exists) {
                    batch.update(userRef, { balance: userSnap.data().balance + amount });
                }
                await batch.commit();
                alert('ยกเลิกและคืนเงินสำเร็จ');
            }
        }

        // --- 2. Load Users ---
        db.collection('users').onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const u = doc.data();
                html += `<tr>
                    <td><b>${doc.id}</b></td>
                    <td>${u.name}</td>
                    <td>${u.password}</td>
                    <td style="color:#22c55e; font-weight:bold;">${u.balance}</td>
                    <td>
                        <button class="btn btn-blue" onclick="editBalance('${doc.id}', ${u.balance})">แก้ไขยอดเงิน</button>
                        <button class="btn btn-red" onclick="deleteUser('${doc.id}')">ลบ</button>
                    </td>
                </tr>`;
            });
            document.getElementById('user-table').innerHTML = html;
        });

        async function createUser() {
            const { value: formValues } = await Swal.fire({
                title: 'สร้างรหัสสมาชิก',
                html: '<input id="swal-id" class="swal2-input" placeholder="ไอดี 6 หลัก (เช่น 123456)">' +
                      '<input id="swal-name" class="swal2-input" placeholder="ชื่อเล่นลูกค้า">' +
                      '<input id="swal-pw" class="swal2-input" placeholder="รหัสผ่าน">',
                focusConfirm: false,
                preConfirm: () => {
                    return [ document.getElementById('swal-id').value, document.getElementById('swal-name').value, document.getElementById('swal-pw').value ]
                }
            });
            if(formValues && formValues[0].length === 6) {
                await db.collection('users').doc(formValues[0]).set({
                    name: formValues[1], password: formValues[2], balance: 0, bank: '', bankAcc: '', bankName: ''
                });
                Swal.fire('สำเร็จ', 'สร้างยูสเซอร์เรียบร้อย', 'success');
            } else { Swal.fire('ผิดพลาด', 'ไอดีต้องมี 6 หลัก', 'error'); }
        }

        async function editBalance(uid, currentBal) {
            const { value: amount } = await Swal.fire({
                title: 'แก้ไขยอดเงิน', input: 'number', inputValue: currentBal, showCancelButton: true
            });
            if(amount) {
                await db.collection('users').doc(uid).update({ balance: parseFloat(amount) });
            }
        }

        async function deleteUser(uid) {
            if(confirm('ลบสมาชิกนี้ถาวร?')) await db.collection('users').doc(uid).delete();
        }

        // --- 3. System Setup ---
        window.onload = async () => {
            const sys = await db.collection('settings').doc('system').get();
            if(sys.exists) document.getElementById('sys-withdraw').value = sys.data().withdraw_status || 'open';
        };

        async function saveSystem() {
            await db.collection('settings').doc('system').set({
                withdraw_status: document.getElementById('sys-withdraw').value
            });
            Swal.fire('บันทึกสำเร็จ', 'อัปเดตระบบแล้ว', 'success');
        }
    </script>
</body>
</html>
