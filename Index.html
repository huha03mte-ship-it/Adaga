<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RS Admin | จัดการระบบ</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Kanit', sans-serif; background: #f3f4f6; } </style>
</head>
<body class="flex min-h-screen">

    <div class="w-64 bg-gray-900 text-white flex flex-col shadow-lg z-10 hidden md:flex">
        <div class="p-6 text-center border-b border-gray-800">
            <h2 class="text-2xl font-bold text-green-400"><i class="fas fa-shield-alt"></i> RS ADMIN</h2>
            <p class="text-xs text-gray-400 mt-1">ระบบจัดการไม่มีล็อกอิน</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('tab-users')" class="w-full flex items-center p-3 text-gray-300 hover:bg-gray-800 hover:text-green-400 rounded-lg transition"><i class="fas fa-users w-6"></i> สมาชิก</button>
            <button onclick="switchTab('tab-withdraw')" class="w-full flex items-center p-3 text-gray-300 hover:bg-gray-800 hover:text-green-400 rounded-lg transition"><i class="fas fa-hand-holding-usd w-6"></i> รายการถอน</button>
            <button onclick="switchTab('tab-settings')" class="w-full flex items-center p-3 text-gray-300 hover:bg-gray-800 hover:text-green-400 rounded-lg transition"><i class="fas fa-cog w-6"></i> ตั้งค่าระบบ</button>
        </nav>
    </div>

    <div class="flex-1 p-8">
        
        <div id="tab-users" class="tab-content block">
            <h2 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-users text-blue-500"></i> จัดการสมาชิก</h2>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr><th class="p-4">อีเมล / ชื่อ</th><th class="p-4">ยอดเงิน (฿)</th><th class="p-4">โอกาสชนะ (%)</th><th class="p-4">จัดการ</th></tr>
                    </thead>
                    <tbody id="user-table" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-withdraw" class="tab-content hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-hand-holding-usd text-red-500"></i> รายการขอถอนเงิน</h2>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr><th class="p-4">ผู้เล่น</th><th class="p-4">จำนวนเงิน</th><th class="p-4">บัญชีรับเงิน</th><th class="p-4">จัดการ</th></tr>
                    </thead>
                    <tbody id="wd-table" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-settings" class="tab-content hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-cog text-gray-500"></i> ตั้งค่าระบบ</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 max-w-lg">
                <label class="block text-sm font-bold text-gray-700 mb-2">ลิงก์ติดต่อแอดมิน (สำหรับปุ่มฝากเงิน)</label>
                <input type="text" id="contact-link" placeholder="เช่น https://line.me/ti/p/~yourid" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-green-500">
                <button onclick="saveSettings()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition shadow-md">บันทึกการตั้งค่า</button>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ โค้ด Firebase ของคุณ
        const firebaseConfig = { apiKey: "AIzaSyCrpBKrWplX3qQT_h-QMftmaTSV71sikf4", projectId: "fnag-b078c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        // โหลดข้อมูลสมาชิกระบบ
        db.collection('users').onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const u = doc.data();
                html += `<tr>
                    <td class="p-4"><b>${u.name || '-'}</b><br><span class="text-sm text-gray-500">${u.email || doc.id}</span></td>
                    <td class="p-4 text-green-600 font-bold">${(u.balance || 0).toLocaleString()}</td>
                    <td class="p-4 text-orange-500 font-bold">${u.winRate !== undefined ? u.winRate : 35}%</td>
                    <td class="p-4"><button onclick="editUser('${doc.id}', ${u.balance || 0}, ${u.winRate !== undefined ? u.winRate : 35})" class="bg-blue-500 text-white px-4 py-2 rounded shadow hover:bg-blue-600">แก้ไข</button></td>
                </tr>`;
            });
            document.getElementById('user-table').innerHTML = html || '<tr><td colspan="4" class="p-4 text-center">ไม่มีข้อมูล</td></tr>';
        });

        async function editUser(uid, bal, rate) {
            const { value: form } = await Swal.fire({
                title: 'แก้ไขข้อมูลผู้เล่น',
                html: `
                    <div class="text-left mb-2"><label class="text-sm">ยอดเงิน</label><input id="s-bal" type="number" class="w-full p-2 border rounded" value="${bal}"></div>
                    <div class="text-left"><label class="text-sm">โอกาสชนะ (%)</label><input id="s-rate" type="number" class="w-full p-2 border rounded" value="${rate}"></div>
                `,
                showCancelButton: true, confirmButtonText: 'บันทึก',
                preConfirm: () => ({ bal: Number(document.getElementById('s-bal').value), rate: Number(document.getElementById('s-rate').value) })
            });
            if(form) {
                await db.collection('users').doc(uid).update({ balance: form.bal, winRate: form.rate });
                Swal.fire({icon:'success', title:'บันทึกแล้ว', toast:true, position:'top-end', timer:1500, showConfirmButton:false});
            }
        }

        // โหลดรายการถอนเงิน
        db.collection('transactions').where('status', '==', 'pending').onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const t = doc.data();
                html += `<tr>
                    <td class="p-4"><b>${t.name}</b></td>
                    <td class="p-4 text-red-500 font-bold">${t.amount.toLocaleString()} ฿</td>
                    <td class="p-4">${t.bankName}<br><span class="text-sm text-gray-500">${t.bankAcc}</span></td>
                    <td class="p-4">
                        <button onclick="updateTx('${doc.id}', 'success')" class="bg-green-500 text-white px-3 py-1 rounded shadow hover:bg-green-600 mr-2">อนุมัติ</button>
                        <button onclick="updateTx('${doc.id}', 'cancel', '${t.uid}', ${t.amount})" class="bg-red-500 text-white px-3 py-1 rounded shadow hover:bg-red-600">ยกเลิกคืนเงิน</button>
                    </td>
                </tr>`;
            });
            document.getElementById('wd-table').innerHTML = html || '<tr><td colspan="4" class="p-4 text-center">ไม่มีรายการรอถอน</td></tr>';
        });

        async function updateTx(txId, status, uid = null, amount = 0) {
            if(!(await Swal.fire({title:'ยืนยันการทำรายการ?', icon:'question', showCancelButton:true})).isConfirmed) return;
            const batch = db.batch();
            batch.update(db.collection('transactions').doc(txId), {status: status});
            if(status === 'cancel' && uid) {
                const userRef = db.collection('users').doc(uid);
                const uDoc = await userRef.get();
                if(uDoc.exists) batch.update(userRef, {balance: uDoc.data().balance + amount});
            }
            await batch.commit();
            Swal.fire('สำเร็จ', 'อัปเดตสถานะแล้ว', 'success');
        }

        // โหลดการตั้งค่าลิงก์
        db.collection('settings').doc('admin').get().then(doc => {
            if(doc.exists) document.getElementById('contact-link').value = doc.data().contact_link || '';
        });

        async function saveSettings() {
            const link = document.getElementById('contact-link').value;
            await db.collection('settings').doc('admin').set({ contact_link: link }, {merge: true});
            Swal.fire('สำเร็จ', 'บันทึกลิงก์ติดต่อแอดมินแล้ว', 'success');
        }
    </script>
</body>
</html>
